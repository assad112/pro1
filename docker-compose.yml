services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pmms_app
    ports:
      - "8000:80"
    environment:
      PMMS_DB_HOST: db
      PMMS_DB_PORT: 3306
      PMMS_DB_USER: pmms_user
      PMMS_DB_PASS: pmms_pass
      PMMS_DB_NAME: pmms
    depends_on:
      - db
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:8.0
    container_name: pmms_db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: pmms
      MYSQL_USER: pmms_user
      MYSQL_PASSWORD: pmms_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - pmms_db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  pmms_db_data:
